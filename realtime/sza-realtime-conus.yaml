channels: ['02','05']
slots: ['East-ABI19-CONUS']
timeout-limit: 45 #seconds

sza-threshold: '88.85'
temp-file-loc: '/localdata/sza-realtime/temp/'
output-file-loc: '/localdata/sza-realtime/output/'

East-ABI19-CONUS:
    sport-url: 'https://nssrgeo.ndc.nasa.gov/satellite/goes19/abi/l2/conus/'

West-ABI18-CONUS:
    sport-url: 'https://nssrgeo.ndc.nasa.gov/satellite/goes18/abi/l2/conus/'
